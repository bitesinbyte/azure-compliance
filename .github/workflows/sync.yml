name: Sync Compliance Data

on:
  schedule:
    - cron: "0 0 * * 1" # Every Monday at midnight UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      has-changes: ${{ steps.commit.outputs.has-changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        run: go build -o sync ./cmd/sync

      - name: Run sync
        env:
          GIT_PERSONAL_TOKEN: ${{ secrets.GIT_PERSONAL_TOKEN }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          OUTPUT_DIR: data
        run: ./sync

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/azure-compliance.json config.json
          if git diff --cached --quiet; then
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: sync compliance data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          fi
        id: commit

  deploy:
    needs: sync
    if: needs.sync.outputs.has-changes == 'true'
    uses: ./.github/workflows/deploy.yml
